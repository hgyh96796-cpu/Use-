<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Thumbnail Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="container">

      <div class="card">
        <div class="logo-wrap">
          <img src="assets/icon.png" alt="App Icon" class="app-icon" />
          <h1>YouTube Thumbnail Downloader</h1>
        </div>

        <p class="subtitle">
          Paste any YouTube video link, preview thumbnail, and save it instantly.
        </p>

        <input
          type="text"
          id="videoUrl"
          placeholder="Paste YouTube video URL here..."
        />

        <button onclick="getThumbnail()">Get Thumbnail</button>

        <div id="result" class="hidden">
          <h2>Thumbnail Preview</h2>
          <img id="thumbnailImg" src="" alt="Thumbnail Preview" />

          <div class="btn-group">
            <button class="download-btn" onclick="saveThumbnail('hd')">Save HD</button>
            <button class="download-btn secondary" onclick="saveThumbnail('mq')">Save Medium</button>
          </div>
        </div>

        <p id="error" class="error"></p>
      </div>

      <!-- Clickable Sponsored Ad Card -->
      <div class="ad-card" onclick="openSponsoredAd()">
        <div class="ad-label">Sponsored</div>
        <div class="ad-content">
          <h3>🔥 Featured Offer</h3>
          <p>Tap here to explore today’s sponsored deal.</p>
          <button class="ad-open-btn">Open Offer</button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
